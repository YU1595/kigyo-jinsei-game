            onClick={() => setShow3D(false)}
            style={{
              padding: '4px 14px', borderRadius: 20, fontSize: '0.72rem', fontWeight: 700,
              border: '1.5px solid #4ecdc4', cursor: 'pointer', transition: 'all 0.2s',
              background: !show3D ? '#4ecdc4' : 'transparent',
              color: !show3D ? '#1a3a2a' : '#4ecdc4',
            }}>
            🗺 2D マップ
          </button>
          <button
            onClick={() => setShow3D(true)}
            style={{
              padding: '4px 14px', borderRadius: 20, fontSize: '0.72rem', fontWeight: 700,
              border: '1.5px solid #6ac483', cursor: 'pointer', transition: 'all 0.2s',
              background: show3D ? '#6ac483' : 'transparent',
              color: show3D ? '#1a3a2a' : '#6ac483',
            }}>
            🏛 3D ビュー
          </button>
        </div>
        {show3D
          ? <ThreeBoard players={engine.players} currentPlayerPos={engine.currentPlayer.position} currentPlayerId={engine.currentPlayer.id} />
          : <Board     players={engine.players} currentPlayerPos={engine.currentPlayer.position} />
        }
      </div>

      {/* サイドパネル */}
      <div style={{ width: 210, flexShrink: 0, display: 'flex', flexDirection: 'column', gap: 12, marginTop: 36 }}>

        {/* プレイヤー一覧 */}
        <div className="side-card">
          <div className="side-card-title">Players</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {engine.players.map((p, i) => {
              const ch = CHARACTERS.find(c => c.id === p.character);
              const isActive = i === engine.currentIdx;
              return (
                <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                  <div style={{ width: 32, height: 42, borderRadius: 8, background: PLAYER_BGS[i], border: `2.5px solid ${PLAYER_COLORS[i]}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'hidden', flexShrink: 0 }}>
                    <svg viewBox="0 0 30 40" width="28" height="37" style={{ display: 'block' }}>
                      <use href={`#char-${p.character}`}/>
                    </svg>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: '0.72rem', fontWeight: 700, color: '#3a5a3a' }}>{p.name}{p.finished ? ' 🎓' : ''}</div>
                    <div style={{ fontSize: '0.5rem', fontFamily: 'Poppins,sans-serif', color: '#8aaa8a' }}>マス {p.position} / 💰{p.money} / GPA {p.gpa.toFixed(1)}</div>
                  </div>
                  {isActive && (
                    <span style={{ fontSize: '0.45rem', fontFamily: 'Poppins,sans-serif', fontWeight: 700, color: '#fff', padding: '2px 6px', borderRadius: 8,
                      background: 'linear-gradient(90deg, #4ecdc4, #6ac483)' }}>TURN</span>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* サイコロ */}
        <div className="side-card" style={{ textAlign: 'center' }}>
          <div className="side-card-title">Dice</div>
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 78, height: 78, borderRadius: 16, background: '#fff', border: '2px solid #b8d4a8',
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '2.5rem', margin: '0 auto' }}
              className={engine.rolling ? 'animate-dice' : ''}>
              {engine.diceValue ? DICE_FACES[engine.diceValue - 1] : '🎲'}
            </div>
            {engine.turnPhase === 'idle' && !engine.currentPlayer.finished && !engine.currentPlayer.skipNextTurn && !engine.skipMessage ? (
              <button onClick={engine.rollDice}
                style={{ width: '100%', padding: '8px 0', fontFamily: 'Poppins,sans-serif', fontWeight: 700, fontSize: '0.8rem', color: '#fff', borderRadius: 10, border: 'none', cursor: 'pointer',
                  background: 'linear-gradient(90deg, #4ecdc4, #6ac483)', boxShadow: '0 2px 8px rgba(78,205,196,0.3)', transition: 'transform 0.15s, box-shadow 0.15s' }}
                onMouseEnter={e => { e.target.style.transform = 'translateY(-2px)'; e.target.style.boxShadow = '0 4px 14px rgba(78,205,196,0.4)'; }}
                onMouseLeave={e => { e.target.style.transform = ''; e.target.style.boxShadow = '0 2px 8px rgba(78,205,196,0.3)'; }}>
                🎲 Roll Dice
              </button>
            ) : engine.diceValue && !engine.rolling && engine.turnPhase !== 'event' ? (
              <div style={{ fontSize: '0.75rem', fontWeight: 700, color: '#3a5a3a' }}>{engine.diceValue} マス進む！</div>
            ) : null}
          </div>
        </div>

        {/* 凡例 */}
        <div className="side-card">
          <div className="side-card-title">Legend</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, fontSize: '0.52rem' }}>
            {[['#5ab85a','良いイベント'],['#d06050','悪いイベント'],['#d0a030','特殊イベント'],['#4ecdc4','START'],['#e8a030','GOAL']].map(([c,l]) => (
              <div key={l} style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <div style={{ width: 10, height: 10, borderRadius: '50%', border: `2px solid ${c}`, flexShrink: 0 }} />
                <span style={{ color: '#3a5a3a' }}>{l}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ログ */}
        <div className="side-card">
          <div className="side-card-title">Log</div>
          <div ref={logRef} style={{ maxHeight: 100, overflowY: 'auto', fontSize: '0.52rem', color: '#6a8a6a', display: 'flex', flexDirection: 'column', gap: 2 }}>
            {gameLog.length === 0 ? <span style={{ color: '#aac0aa' }}>ゲーム開始...</span> :
              gameLog.map((l, i) => <div key={i}>{l}</div>)}
          </div>
        </div>

        {/* Quarter */}
        <div className="side-card" style={{ padding: 8 }}>
          <QuarterDisplay currentQuarter={engine.currentQuarter} />
        </div>
      </div>

      {/* Skip Turn Message */}
      {engine.skipMessage && (
        <div className="fixed inset-0 z-30 flex items-center justify-center" style={{ backgroundColor: 'rgba(0,0,0,0.5)', backdropFilter: 'blur(4px)' }}>
          <div className="rounded-2xl px-8 py-6 text-center animate-slide-up"
               style={{ background: 'rgba(245,250,240,0.95)', border: '1px solid #b8d4a8' }}>
            <p className="text-2xl mb-2">⏸️</p>
            <p className="font-bold text-lg" style={{ color: '#3a5a3a' }}>{engine.skipMessage}</p>
          </div>
        </div>
      )}

      {/* Event Modal */}
      {engine.showModal && engine.currentSquare && (
        <EventModal
          square={engine.currentSquare}
          player={engine.players[engine.currentIdx]}
          onComplete={engine.handleEventComplete}
        />
      )}
    </div>
  );
}

/* ============================================================
   RESULT SCREEN
   ============================================================ */
function ResultScreen({ players, onRestart }) {
  const [showConfetti, setShowConfetti] = useState(true);

  // Play fanfare on mount
  useEffect(() => {
    SoundManager.stopBGM();
    setTimeout(() => SoundManager.fanfare(), 300);
  }, []);

  const ranked = useMemo(() => {
    const scored = players.map(p => ({
      ...p,
      rawScore: p.money + p.sp,
      penalized: p.gpa < 2.0,
      finalScore: calculateScore(p),
    }));
    scored.sort((a, b) => {
      if (b.finalScore !== a.finalScore) return b.finalScore - a.finalScore;
      return b.gpa - a.gpa;
    });
    return scored.map((p, i) => ({
      ...p,
      rank: i + 1,
      titleInfo: getTitle(i + 1, p.gpa),
    }));
  }, [players]);

  useEffect(() => {
    const timer = setTimeout(() => setShowConfetti(false), 5000);
    return () => clearTimeout(timer);
  }, []);

  const handleShareToX = () => {
    const rankEmoji = ['🥇', '🥈', '🥉', '4️⃣', '5️⃣', '6️⃣'];
    const lines = ranked.map((p, i) =>
      `${rankEmoji[i] || `${p.rank}位`} ${p.name}｜${p.titleInfo.emoji}${p.titleInfo.title}｜${p.finalScore}万円`
    );
    const winner = ranked[0];
    const text = [
      `🏆 起業人生ゲーム 決算発表！`,
      `優勝：${winner.name}（${winner.finalScore}万円）`,
      ``,
      ...lines,
      ``,
      `#起業人生ゲーム #ボードゲーム #大学祭`,
    ].join('\n');
    window.open(
      `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`,
      '_blank', 'noopener,noreferrer'
    );
  };

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4"
         style={{ background: 'linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #1a1f3a 70%, #0f172a 100%)' }}>
      {showConfetti && <Confetti />}

      <div className="max-w-lg w-full space-y-5">
        <div className="text-center space-y-2">
          <div className="text-4xl mb-1">🏆</div>
          <h2 className="text-2xl font-extrabold animate-title-glow"
              style={{ background: 'linear-gradient(135deg, #e0e7ff 0%, #a5b4fc 40%, #818cf8 100%)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>
            最終結果発表
          </h2>
          <p className="text-xs" style={{ color: '#64748b' }}>起業人生ゲーム 決算報告</p>
        </div>

        <div className="space-y-3">
          {ranked.map((p, i) => {
            const rankColors = [
              { bg: 'linear-gradient(135deg, #fbbf24, #f59e0b)', border: 'rgba(251,191,36,0.5)', glow: 'rgba(251,191,36,0.15)' },
              { bg: 'linear-gradient(135deg, #94a3b8, #64748b)', border: 'rgba(148,163,184,0.4)', glow: 'none' },
              { bg: 'linear-gradient(135deg, #d97706, #b45309)', border: 'rgba(217,119,6,0.4)', glow: 'none' },
              { bg: 'rgba(51,65,85,0.5)', border: 'rgba(51,65,85,0.3)', glow: 'none' },
            ];
            const rc = rankColors[Math.min(i, 3)];
            return (
            <div key={p.id}
              className="rounded-2xl p-4 animate-slide-up"
              style={{ background: 'rgba(30,41,59,0.7)', backdropFilter: 'blur(12px)', border: `1px solid ${rc.border}`, boxShadow: i === 0 ? `0 4px 20px ${rc.glow}` : 'none', animationDelay: `${i * 0.2}s` }}
            >
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg font-bold"
                     style={{ background: rc.bg, color: i <= 2 ? '#0f172a' : '#94a3b8' }}>
                  {p.rank}

                <CharacterAvatar character={p.character} size="md" />
                <div className="flex-1">
                  <div className="font-semibold" style={{ color: '#e2e8f0' }}>{p.name}</div>

              {/* Score Breakdown */}
              <div className="mt-3 grid grid-cols-4 gap-2 text-center text-xs">
                <div className="rounded-lg p-1.5" style={{ background: 'rgba(15,23,42,0.5)' }}>

                  <div style={{ color: '#64748b', fontSize: '10px' }}>⚡ SP</div>
                </div>
                <div className="rounded-lg p-1.5" style={{ background: 'rgba(15,23,42,0.5)' }}>
                  <div className="font-bold" style={{ color: p.gpa < 2.0 ? '#f87171' : '#4ade80' }}>{p.gpa.toFixed(1)}</div>

                </div>
                <div className="rounded-lg p-1.5" style={{ background: 'rgba(15,23,42,0.5)' }}>

                </div>
              </div>
              {p.penalized && (
                <div className="mt-2 text-center text-xs font-semibold rounded-lg py-1.5"
                     style={{ background: 'rgba(239,68,68,0.1)', color: '#f87171', border: '1px solid rgba(239,68,68,0.2)' }}>
                  ⚠️ GPA 2.0未満のため総資産半減！ ({p.rawScore}万 → {p.finalScore}万)
                </div>
              )}
            </div>
            );
          })}
        </div>

        {/* X (Twitter) 投稿ボタン */}
        <button
          onClick={handleShareToX}
          className="w-full py-3.5 font-bold rounded-xl text-base active:scale-[0.98] transition-all flex items-center justify-center gap-2"
          style={{
            background: 'linear-gradient(135deg, #0f0f0f, #1a1a1a)',
            color: '#ffffff',
            border: '1px solid rgba(255,255,255,0.18)',
            boxShadow: '0 4px 15px rgba(0,0,0,0.5)',
          }}
        >
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
          結果をXに投稿する
        </button>

        <button

          className="w-full py-3.5 font-bold rounded-xl text-lg active:scale-[0.98] transition-all mt-2"
          style={{ background: 'linear-gradient(135deg, #4f46e5, #7c3aed)', color: '#fff', boxShadow: '0 4px 15px rgba(79,70,229,0.4)' }}

    </div>
  );
}

/* ============================================================
   HOST LOBBY SCREEN (Mode B - waiting for players)
   ============================================================ */
function HostLobbyScreen({ roomCode, onStart, onCancel }) {
  const [room, setRoom] = useState(null);
  // Auto-detect: use hostname unless it's localhost/127.0.0.1
  const defaultHost = (() => {
    const h = window.location.hostname;
    return (h === 'localhost' || h === '127.0.0.1') ? '' : h;
  })();
  const [hostIp, setHostIp] = useState(defaultHost);
  const isLocalhost = !hostIp || hostIp === 'localhost' || hostIp === '127.0.0.1';
  const joinUrl = FirebaseManager.getJoinUrl(roomCode, hostIp || null);

  useEffect(() => {
    const unsub = FirebaseManager.listenRoom((data) => {
      setRoom(data);
    });
    return unsub;
  }, [roomCode]);

  const playerList = room?.players ? Object.entries(room.players).sort((a, b) => a[1].order - b[1].order) : [];
  const canStart = playerList.length >= 2;

  function handleStart() {
    if (!canStart) return;
    SoundManager.click();
    const turnOrder = playerList.map(([uid]) => uid);
    const gamePlayers = playerList.map(([uid, p], i) => ({
      id: i,
      uid,
      name: p.name,
      character: p.character,
      money: 50,
      gpa: 3.0,
      sp: 0,
      position: 1,
      finished: false,
      skipNextTurn: false,
    }));
    onStart(gamePlayers, turnOrder);
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-gray-900 via-gray-800 to-gray-900">
      <div className="text-center space-y-6 max-w-md w-full">
        <h2 className="text-2xl font-bold text-yellow-400">📺 ホスト画面</h2>
        <p className="text-gray-400 text-sm">プレイヤーの参加を待っています...</p>

        {/* IP Address Setup (must come first) */}
        {isLocalhost ? (
          <div className="bg-yellow-900/40 border-2 border-yellow-500 rounded-2xl p-5 space-y-3">
            <div className="text-center">
              <div className="text-3xl mb-2">⚠️</div>
              <p className="text-yellow-300 font-bold text-base">最初にPCのIPアドレスを入力してください</p>
              <p className="text-yellow-200/70 text-xs mt-1">スマホからアクセスするために必要です</p>
            </div>
            <input
              type="text"
              value={hostIp}
              onChange={(e) => setHostIp(e.target.value.trim())}
              placeholder="192.168.0.14"
              autoFocus
              className="w-full text-center text-xl font-bold bg-gray-900 text-yellow-400 px-3 py-3 rounded-lg border-2 border-yellow-500 focus:border-yellow-300 focus:outline-none"
            />
            <div className="bg-gray-900/60 rounded-lg p-3 text-left">
              <p className="text-gray-400 text-[10px] mb-1">▼ ターミナルで以下を実行して確認:</p>
              <code className="text-green-400 text-xs">ipconfig getifaddr en0</code>
            </div>
          </div>
        ) : (
          <>
            {/* Room Code & QR */}
            <div className="bg-gray-800 rounded-2xl p-6 space-y-4">
              <div>
                <p className="text-gray-400 text-xs mb-1">ルームコード</p>
                <div className="text-5xl font-bold text-yellow-400 tracking-widest">{roomCode}</div>
              </div>
              <div className="flex justify-center">
                <QRCodeDisplay text={joinUrl} size={220} />
              </div>
              <p className="text-gray-500 text-[10px] break-all">{joinUrl}</p>

              <div className="flex items-center gap-2 pt-2 border-t border-gray-700">
                <label className="text-gray-400 text-[10px] flex-shrink-0">IP:</label>
                <input
                  type="text"
                  value={hostIp}
                  onChange={(e) => setHostIp(e.target.value.trim())}
                  className="flex-1 text-center bg-gray-900 text-white px-2 py-1 rounded text-xs border border-gray-600 focus:border-yellow-400 focus:outline-none"
                />
              </div>
            </div>
          </>
        )}

        {/* Player List */}
        <div className="bg-gray-800 rounded-2xl p-4 space-y-2">
          <p className="text-gray-300 text-sm font-bold">参加者 ({playerList.length}/4)</p>
          {playerList.length === 0 ? (
            <p className="text-gray-500 text-sm py-4">まだ誰も参加していません</p>
          ) : (
            <div className="space-y-2">
              {playerList.map(([uid, p], i) => {
                const ch = CHARACTERS.find(c => c.id === p.character);
                return (
                  <div key={uid} className="flex items-center gap-3 bg-gray-700 rounded-xl p-3">
                    <CharacterAvatar character={p.character} size="sm" />
                    <div className="flex-1 text-left">
                      <div className="text-white font-bold text-sm">{p.name}</div>
                      <div className="text-gray-400 text-[10px]">{ch?.name}</div>
                    </div>
                    <div className="text-green-400 text-xs">接続中</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        <button
          onClick={handleStart}
          disabled={!canStart}
          className={`w-full py-4 font-bold rounded-xl text-xl active:scale-95 transition-all
            ${canStart ? 'bg-green-600 hover:bg-green-500 text-white' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}
        >
          {canStart ? 'ゲームスタート！ 🎲' : '2人以上で開始できます'}
        </button>
        <button
          onClick={onCancel}
          className="w-full py-2 text-gray-500 hover:text-gray-300 text-sm transition-colors"
        >
          キャンセル
        </button>
      </div>
    </div>
  );
}

            </button>
          </div>
        </div>
        <div className="flex-1 overflow-y-auto px-4 py-2 min-h-0">
          {show3D
            ? <ThreeBoard players={engine.players} currentPlayerPos={engine.currentPlayer.position} currentPlayerId={engine.currentPlayer.id} />
            : <Board     players={engine.players} currentPlayerPos={engine.currentPlayer.position} />
          }
        </div>
      </div>

      {/* Right: Sidebar */}
      <div className="w-72 lg:w-80 bg-gray-800 border-l border-gray-700 flex flex-col overflow-y-auto">
        <div className="p-3 border-b border-gray-700 text-center">
          <p className="text-gray-500 text-[10px]">部屋コード: <span className="text-yellow-400 font-bold">{roomCode}</span></p>
        </div>

        {/* Player Cards */}
        <div className="p-3 space-y-2 flex-1">
          {engine.players.map((p, i) => (
            <PlayerCard key={p.id} player={p} isActive={i === engine.currentIdx} />
          ))}
        </div>

        {/* Turn Info + Proxy Buttons */}
        <div className="p-3 border-t border-gray-700 space-y-3">
          {engine.skipMessage && (
            <div className="text-center bg-gray-900 rounded-xl p-3">
              <p className="text-xl">⏸️</p>
              <p className="text-white font-bold text-sm">{engine.skipMessage}</p>
            </div>
          )}

          {engine.turnPhase === 'idle' && !engine.currentPlayer.finished && !engine.currentPlayer.skipNextTurn && !engine.skipMessage && (
            <div className="text-center space-y-2">
              <p className="text-yellow-400 font-bold text-sm">
                {engine.currentPlayer.name} のターン
              </p>
              <p className="text-gray-500 text-[10px]">📱 スマホで操作中...</p>
              <button
                onClick={engine.rollDice}
                className="w-full py-3 bg-yellow-500/30 hover:bg-yellow-500/50 text-yellow-400 border border-yellow-500/50 font-bold rounded-xl text-sm active:scale-95 transition-all"
              >
                🎲 代理操作: サイコロを振る
              </button>
            </div>
          )}

          {(engine.turnPhase === 'rolling' || engine.diceValue) && engine.turnPhase !== 'event' && (
            <div className="text-center">
              <DiceDisplay value={engine.diceValue} rolling={engine.rolling} />
              {!engine.rolling && engine.diceValue && (
                <p className="text-yellow-400 font-bold mt-1 text-sm">{engine.diceValue} マス進む！</p>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Event Modal (full screen overlay) */}
      {engine.showModal && engine.currentSquare && (
        <EventModal
          square={engine.currentSquare}
          player={engine.players[engine.currentIdx]}
          onComplete={engine.handleEventComplete}
          remoteAction={engine.remoteAction}
          onRemoteActionConsumed={() => engine.setRemoteAction(null)}
        />
      )}
    </div>
  );
}

/* ============================================================
   CONTROLLER JOIN SCREEN (Mode B - player joining)
   ============================================================ */
function ControllerJoinScreen({ initialRoomCode, onJoined, onCancel, firebaseReady }) {
  const [roomCode, setRoomCode] = useState(initialRoomCode || '');
  const [name, setName] = useState('');
  const [character, setCharacter] = useState(null);
  const [error, setError] = useState(null);
  const [joining, setJoining] = useState(false);
  const [usedChars, setUsedChars] = useState([]);

  // firebaseReady が変わったタイミングでも再購読できるよう依存配列に追加
  useEffect(() => {
    if (roomCode.length !== 4 || !firebaseReady || !FirebaseManager.db) return;
    const ref = FirebaseManager.db.ref(`rooms/${roomCode}/players`);
    const handler = ref.on('value', snap => {
      const players = snap.val();
      if (players) {
        setUsedChars(Object.values(players).map(p => p.character));
      } else {
        setUsedChars([]);
      }
    });
    return () => ref.off('value', handler);
  }, [roomCode, firebaseReady]);

  async function handleJoin() {
    if (!roomCode || !name || !character || joining || !firebaseReady) return;
    setJoining(true);
    setError(null);
    try {
      await FirebaseManager.joinRoom(roomCode.toUpperCase(), name, character);
      SoundManager.click();
      onJoined(roomCode.toUpperCase());
    } catch (e) {
      setError(e.message);
    }
    setJoining(false);
  }

  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-gradient-to-b from-gray-900 via-gray-800 to-gray-900">
      <div className="text-center space-y-4 max-w-sm w-full">
        <h2 className="text-2xl font-bold text-purple-400">📱 プレイヤー参加</h2>

        {/* Firebase接続中インジケータ */}
        {!firebaseReady && (
          <div className="bg-yellow-900/40 border border-yellow-600 rounded-xl p-3 flex items-center justify-center gap-2">
            <svg className="animate-spin h-4 w-4 text-yellow-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            <p className="text-yellow-400 text-sm">サーバーに接続中...</p>
          </div>
        )}

        {/* Room Code Input */}
        <div className="bg-gray-800 rounded-2xl p-4 space-y-3">
          <label className="text-gray-300 text-sm font-bold block">ルームコード</label>
          <input
            type="text"
            value={roomCode}
            onChange={(e) => setRoomCode(e.target.value.toUpperCase().slice(0, 4))}
            placeholder="例: A3K9"
            maxLength={4}
            className="w-full text-center text-3xl font-bold tracking-widest bg-gray-900 text-yellow-400 px-4 py-3 rounded-xl border border-gray-600 focus:border-yellow-400 focus:outline-none uppercase"
          />
        </div>

        {/* Name Input */}
        <div className="bg-gray-800 rounded-2xl p-4 space-y-3">
          <label className="text-gray-300 text-sm font-bold block">名前</label>
          <input
            type="text"
            value={name}
            onChange={(e) => setName(e.target.value)}
            placeholder="あなたの名前"
            className="w-full bg-gray-900 text-white px-4 py-3 rounded-xl border border-gray-600 focus:border-yellow-400 focus:outline-none text-center"
          />
        </div>

        {/* Character Selection */}
        <div className="bg-gray-800 rounded-2xl p-4 space-y-3">
          <label className="text-gray-300 text-sm font-bold block">キャラクター</label>
          <div className="grid grid-cols-2 gap-2">
            {CHARACTERS.map(ch => {
              const isUsed = usedChars.includes(ch.id);
              const isSelected = character === ch.id;
              const star = (n) => '★'.repeat(n) + '☆'.repeat(5 - n);
              return (
                <button
                  key={ch.id}
                  onClick={() => !isUsed && setCharacter(ch.id)}
                  disabled={isUsed}
                  className="p-3 rounded-xl border-2 transition-all text-left active:scale-95"
                  style={isSelected
                    ? { borderColor: ch.color, background: '#374151', boxShadow: `0 0 12px ${ch.color}55` }
                    : isUsed
                    ? { borderColor: '#374151', background: '#111827', opacity: 0.4, cursor: 'not-allowed' }
                    : { borderColor: '#4b5563', background: '#374151' }}
                >
                  <div className="flex items-center gap-1.5 mb-1.5">
                    <CharacterAvatar character={ch.id} size="sm" />
                    <div>
                      <div className="font-bold text-xs leading-tight" style={{ color: ch.color }}>{ch.name}</div>
                      <div className="text-[9px] leading-tight text-gray-400">{ch.role}</div>
                    </div>
                  </div>
                  <div className="space-y-0.5">
                    {[['発想', 'idea'], ['行動', 'action'], ['分析', 'analysis'], ['人脈', 'network']].map(([label, key]) => (
                      <div key={key} className="flex items-center gap-1">
                        <span className="text-[8px] w-5 shrink-0 text-gray-500">{label}</span>
                        <span className="text-[8px]" style={{ color: ch.color }}>{star(ch.stats[key])}</span>
                      </div>
                    ))}
                  </div>
                  {isUsed && <div className="text-[10px] text-gray-500 mt-1 text-center">選択済</div>}
                </button>
              );
            })}
          </div>
        </div>

        {error && (
          <div className="bg-red-900/50 border border-red-500 rounded-xl p-3">
            <p className="text-red-400 text-sm">{error}</p>
          </div>
        )}

        <button
          onClick={handleJoin}
          disabled={!roomCode || !name || !character || joining || !firebaseReady}
          className={`w-full py-4 font-bold rounded-xl text-xl active:scale-95 transition-all
            ${roomCode && name && character && !joining && firebaseReady ? 'bg-purple-600 hover:bg-purple-500 text-white' : 'bg-gray-700 text-gray-500 cursor-not-allowed'}`}
        >
          {joining ? '参加中...' : !firebaseReady ? '接続中...' : '部屋に参加 📱'}
        </button>
        <button
          onClick={onCancel}
          className="w-full py-2 text-gray-500 hover:text-gray-300 text-sm transition-colors"
        >
          戻る
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   CONTROLLER GAME SCREEN (Mode B - player's phone view)
   ============================================================ */
function ControllerScreen({ roomCode, onGameEnd }) {
  const [gameState, setGameState] = useState(null);
  const [sending, setSending] = useState(false);

  useEffect(() => {
    const unsub = FirebaseManager.listenRoom((data) => {
      if (data?.game) setGameState(data.game);
      if (data?.status === 'finished' && data?.game?.finished) {
        onGameEnd(data.game.players || []);
      }
    });
    return unsub;
  }, [roomCode]);

  if (!gameState) {
    return (
      <div className="min-h-screen flex items-center justify-center bg-gray-900">
        <div className="text-gray-400 animate-pulse">ゲームデータを読み込み中...</div>
      </div>
    );
  }

  const myUid = FirebaseManager.uid;
  const myPlayerIdx = gameState.players?.findIndex(p => p.uid === myUid);
  const myPlayer = myPlayerIdx >= 0 ? gameState.players[myPlayerIdx] : null;
  const isMyTurn = gameState.currentPlayerUid === myUid;
  const currentPlayerName = gameState.players?.[gameState.currentIdx]?.name || '???';

  async function sendAction(action) {
    if (sending) return;
    setSending(true);
    try {
      await FirebaseManager.writeAction(action);
      SoundManager.click();
    } catch (e) {
      console.error('Action error:', e);
    }
    setSending(false);
  }

  const gpaColor = myPlayer ? (myPlayer.gpa < 2.0 ? 'text-red-400' : myPlayer.gpa < 2.5 ? 'text-orange-400' : 'text-green-400') : 'text-gray-400';

  return (
    <div className="min-h-screen bg-gray-900 flex flex-col p-4">
      {/* Header */}
      <div className="text-center pb-3 border-b border-gray-700 flex-shrink-0">
        <h2 className="text-lg font-bold text-yellow-400">🎲 起業人生ゲーム</h2>
        <p className="text-gray-500 text-[10px]">部屋: {roomCode}</p>
      </div>

      {/* My Stats */}
      {myPlayer && (
        <div className="bg-gray-800 rounded-2xl p-4 mt-3 flex-shrink-0">
          <div className="flex items-center gap-3 mb-3">
            <CharacterAvatar character={myPlayer.character} size="md" />
            <div>
              <div className="text-white font-bold">{myPlayer.name}</div>
              <div className="text-gray-400 text-[10px]">📍 マス{myPlayer.position}{myPlayer.finished ? ' 🏁ゴール済' : ''}</div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div className="bg-gray-900/50 rounded-lg p-2">
              <div className="text-yellow-400 font-bold text-lg">{myPlayer.money}万</div>
              <div className="text-gray-500 text-[10px]">💰 資金</div>
            </div>
            <div className="bg-gray-900/50 rounded-lg p-2">
              <div className={`font-bold text-lg ${gpaColor}`}>{myPlayer.gpa?.toFixed(1)}</div>
              <div className="text-gray-500 text-[10px]">📊 GPA</div>
            </div>
            <div className="bg-gray-900/50 rounded-lg p-2">
              <div className="text-blue-400 font-bold text-lg">{myPlayer.sp}</div>
              <div className="text-gray-500 text-[10px]">⚡ SP</div>
            </div>
          </div>
        </div>
      )}

      {/* Action Area */}
      <div className="flex-1 flex flex-col items-center justify-center py-6">
        {isMyTurn ? (
          <div className="text-center space-y-4 w-full max-w-sm">
            <p className="text-2xl font-bold text-yellow-400 animate-pulse">あなたのターンです！</p>

            {/* Roll Dice */}
            {gameState.phase === 'idle' && !gameState.skipMessage && (
              <button
                onClick={() => sendAction({ type: 'roll' })}
                disabled={sending}
                className="w-full py-6 bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold rounded-2xl text-2xl active:scale-95 transition-transform shadow-lg shadow-yellow-500/30"
              >
                🎲 サイコロを振る
              </button>
            )}

            {/* Dice Result */}
            {gameState.diceValue && gameState.phase !== 'idle' && (
              <div className="text-center">
                <div className="text-6xl mb-2">{DICE_FACES[gameState.diceValue - 1]}</div>
                <p className="text-yellow-400 font-bold">{gameState.diceValue} マス進む！</p>
              </div>
            )}

            {/* Choice Buttons */}
            {gameState.showModal && gameState.choiceLabels && (
              <div className="space-y-3">
                <p className="text-gray-300 text-sm font-bold">{gameState.eventTitle}</p>
                <p className="text-yellow-300 font-bold">どちらを選ぶ？</p>
                {gameState.choiceLabels.map((label, i) => (
                  <button
                    key={i}
                    onClick={() => sendAction({ type: 'choice', value: i })}
                    disabled={sending}
                    className="w-full py-4 bg-gray-700 hover:bg-gray-600 rounded-xl text-white font-bold text-lg border border-gray-500 active:scale-98 transition-transform"
                  >
                    {label}
                  </button>
                ))}
              </div>
            )}

            {/* Judgment Dice */}
            {gameState.showModal && gameState.hasDiceJudgment && !gameState.choiceLabels && (
              <div className="space-y-3">
                <p className="text-gray-300 text-sm font-bold">{gameState.eventTitle}</p>
                <p className="text-yellow-300 font-bold">🎲 サイコロ判定！</p>
                <button
                  onClick={() => sendAction({ type: 'judgment' })}
                  disabled={sending}
                  className="w-full py-5 bg-yellow-500 hover:bg-yellow-400 text-gray-900 font-bold rounded-2xl text-xl active:scale-95 transition-transform"
                >
                  🎲 サイコロを振る
                </button>
              </div>
            )}

            {/* Event info */}
            {gameState.showModal && !gameState.choiceLabels && !gameState.hasDiceJudgment && (
              <div className="bg-gray-800 rounded-xl p-4">
                <p className="text-gray-300 text-sm">{gameState.eventTitle}</p>
                <p className="text-gray-500 text-[10px] mt-1">ホスト画面で結果を確認してください</p>
              </div>
            )}
          </div>
        ) : (
          <div className="text-center space-y-4">
            <div className="text-6xl mb-4">⏳</div>
            <p className="text-gray-300 font-bold text-lg">
              {currentPlayerName} さんのターンです
            </p>
            <p className="text-gray-500 text-sm">お待ちください...</p>
          </div>
        )}
      </div>

      {/* All Players Mini Status */}
      {gameState.players && (
        <div className="flex-shrink-0 border-t border-gray-700 pt-3">
          <div className="flex gap-2 justify-center flex-wrap">
            {gameState.players.map((p, i) => {
              const isActive = i === gameState.currentIdx;
              return (
                <div key={i} className={`flex items-center gap-1 px-2 py-1 rounded-lg text-[10px] ${isActive ? 'bg-yellow-500/20 text-yellow-400' : 'bg-gray-800 text-gray-500'}`}>
                  <CharacterAvatar character={p.character} size="xs" />
                  <span>{p.name}</span>
                  {p.uid === myUid && <span className="text-yellow-400">*</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP COMPONENT
   ============================================================ */
function App() {
  // Check URL for room code (from QR code scan)
  const urlRoomCode = useMemo(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get('room') || null;
  }, []);

  const [mode, setMode] = useState(urlRoomCode ? 'controller' : null); // null | 'local' | 'host' | 'controller'
  const [phase, setPhase] = useState(urlRoomCode ? 'join' : 'title');
  const [numPlayers, setNumPlayers] = useState(2);
  const [players, setPlayers] = useState([]);
  const [finalPlayers, setFinalPlayers] = useState([]);
  const [muted, setMuted] = useState(false);
  const [roomCode, setRoomCode] = useState(urlRoomCode || '');
  const [turnOrder, setTurnOrder] = useState([]);
  const [firebaseReady, setFirebaseReady] = useState(false);

  // Initialize Firebase for Mode B (when entering multi-device mode)
  useEffect(() => {
    if (mode === 'host' || mode === 'controller') {
      (async () => {
        const ok = FirebaseManager.init();
        if (ok) {
          await FirebaseManager.signIn();
          setFirebaseReady(true);
        }
      })();
    }
    return () => {
      if (mode === 'host' || mode === 'controller') {
        FirebaseManager.cleanup();
      }
    };
  }, [mode]);

  // For controller: listen for game start
  useEffect(() => {
    if (mode !== 'controller' || phase !== 'lobby') return;
    const unsub = FirebaseManager.listenRoom((data) => {
      if (data?.status === 'playing') {
        setPhase('playing');
      }
    });
    return unsub;
  }, [mode, phase]);

  // --- Mode A handlers ---
  function handleTitleStartLocal(n) {
    SoundManager.init();
    SoundManager.click();
    setMode('local');
    setNumPlayers(n);
    setPhase('setup');
  }

  function handleSetupStart(playerList) {
    SoundManager.init();
    SoundManager.click();
    setPlayers(playerList);
    setPhase('playing');
  }

  // --- Mode B handlers ---
  async function handleTitleStartMulti(role) {
    SoundManager.init();
    SoundManager.click();
    setMode(role);
    if (role === 'host') {
      setPhase('creating_room');
      const ok = FirebaseManager.init();
      if (ok) {
        await FirebaseManager.signIn();
        setFirebaseReady(true);
        await FirebaseManager.cleanupOldRooms();
        const code = await FirebaseManager.createRoom();
        setRoomCode(code);
        setPhase('lobby');
      }
    } else {
      setPhase('join');
    }
  }

  function handleControllerJoined(code) {
    setRoomCode(code);
    setPhase('lobby');
  }

  function handleHostStartGame(gamePlayers, order) {
    SoundManager.init();
    SoundManager.click();
    setPlayers(gamePlayers);
    setTurnOrder(order);
    FirebaseManager.startGame({
      players: gamePlayers.map((p, i) => ({ ...p, uid: order[i] })),
      currentIdx: 0,
      currentPlayerUid: order[0],
      phase: 'idle',
      diceValue: null,
      currentSquareId: null,
      showModal: false,
      skipMessage: null,
      eventTitle: null,
      eventDescription: null,
      choiceLabels: null,
      hasDiceJudgment: false,
      turnOrder: order,
    });
    setPhase('playing');
  }

  // --- Common handlers ---
  function handleGameEnd(endPlayers) {
    setFinalPlayers(Array.isArray(endPlayers) ? endPlayers : []);
    setPhase('result');
  }

  function handleRestart() {
    SoundManager.click();
    if (mode === 'host') {
      FirebaseManager.deleteRoom();
    }
    FirebaseManager.cleanup();
    setMode(null);
    setPhase('title');
    setPlayers([]);
    setFinalPlayers([]);
    setRoomCode('');
    setTurnOrder([]);
    setFirebaseReady(false);
    // Clear URL params
    if (window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
  }

  function handleCancelMulti() {
    SoundManager.click();
    if (mode === 'host' && roomCode) {
      FirebaseManager.deleteRoom();
    }
    FirebaseManager.cleanup();
    setMode(null);
    setPhase('title');
    setRoomCode('');
    setFirebaseReady(false);
    if (window.history.replaceState) {
      window.history.replaceState({}, '', window.location.pathname);
    }
  }

  function handleToggleMute() {
    SoundManager.init();
    const nowMuted = SoundManager.toggle();
    setMuted(nowMuted);
    if (!nowMuted && phase === 'playing') {
      SoundManager.startBGM();
    }
  }

  return (
    <div className="font-pixel relative">
      {/* Mute Button */}
      <button
        onClick={handleToggleMute}
        className="fixed top-2 right-2 z-50 w-10 h-10 rounded-full bg-gray-800/80 backdrop-blur border border-gray-600 flex items-center justify-center text-lg hover:bg-gray-700/80 active:scale-90 transition-transform shadow-lg"
        title={muted ? '音声ON' : '音声OFF'}
      >
        {muted ? '🔇' : '🔊'}
      </button>

      {/* Title Screen */}
      {phase === 'title' && (
        <TitleScreen
          onStartLocal={handleTitleStartLocal}
          onStartMulti={handleTitleStartMulti}
        />
      )}

      {/* Mode A: Local */}
      {phase === 'setup' && mode === 'local' && (
        <SetupScreen numPlayers={numPlayers} onStart={handleSetupStart} />
      )}
      {phase === 'playing' && mode === 'local' && (
        <GameScreen players={players} onGameEnd={handleGameEnd} />
      )}

      {/* Mode B Host: Creating Room */}
      {phase === 'creating_room' && mode === 'host' && (
        <div className="min-h-screen flex items-center justify-center bg-gray-900">
          <div className="text-center text-gray-400 animate-pulse">部屋を作成中...</div>
        </div>
      )}

      {/* Mode B Host: Lobby */}
      {phase === 'lobby' && mode === 'host' && (
        <HostLobbyScreen
          roomCode={roomCode}
          onStart={handleHostStartGame}
          onCancel={handleCancelMulti}
        />
      )}

      {/* Mode B Host: Playing */}
      {phase === 'playing' && mode === 'host' && (
        <HostGameScreen
          players={players}
          onGameEnd={handleGameEnd}
          roomCode={roomCode}
          turnOrder={turnOrder}
        />
      )}

      {/* Mode B Controller: Join */}
      {phase === 'join' && mode === 'controller' && (
        <ControllerJoinScreen
          initialRoomCode={urlRoomCode || ''}
          onJoined={handleControllerJoined}
          onCancel={handleCancelMulti}
          firebaseReady={firebaseReady}
        />
      )}

      {/* Mode B Controller: Lobby (waiting for game start) */}
      {phase === 'lobby' && mode === 'controller' && (
        <ControllerLobbyScreen roomCode={roomCode} />
      )}

      {/* Mode B Controller: Playing */}
      {phase === 'playing' && mode === 'controller' && (
        <ControllerScreen roomCode={roomCode} onGameEnd={handleGameEnd} />
      )}

      {/* Result Screen (all modes) */}
      {phase === 'result' && (
        <ResultScreen players={finalPlayers} onRestart={handleRestart} />
      )}
    </div>
  );
}

/* ============================================================
   RENDER
   ============================================================ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
